<!DOCTYPE html>
<html lang="es">
<header>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://www.nitworks.net/css/index.css">

    <!-- Favicon en formato .png para navegadores modernos -->
    <link rel="icon" href="https://www.nitworks.net/img/isotipoV2_favicon64x64.png" type="image/png">
    <!-- Favicon especial para dispositivos iOS (iPhones, iPads) -->
    <link rel="apple-touch-icon" href="https://www.nitworks.net/img/isotipoV2_favicon64x64.png">
    <!-- Favicon en formato .ico para compatibilidad universal -->
    <link rel="alternate icon" href="https://www.nitworks.net/img/isotipoV2_favicon32x32.ico" type="image/x-icon">

    <title>NITworks</title>


</header>

<body>
    <main>

        <section class="cabecera viewport" id="particles-js">
            <div class="imagotipo">
                <div>
                    <img src="https://www.nitworks.net/img/isotipo_v2.png" alt="isotipo">
                    <span>NIT</span>
                </div>
                <div>NOVA INTEGRATION TECNOLOGIES</div>
            </div>
            <!-- Indicador de desplazamiento elegante -->
            <div class="scroll-down-indicator">
                <div class="scroll-down-text">Desplázate hacia abajo</div>
                <div class="scroll-down-circle">
                    <div class="scroll-down-arrow"></div>
                </div>
            </div>
        </section>

        <section class="contenido viewport">
            <div></div>
            <div></div>
        </section>



        <img class="whatsapp-icono" src="https://www.nitworks.net/img/Digital_Glyph_Green.svg" alt="Icono whatsapp"
            loading="lazy">


    </main>
    <script src="https://www.nitworks.net/js/index.js"></script>
    <script src="https://www.nitworks.net/js/particles.min.js"></script>
</body>

</html>
